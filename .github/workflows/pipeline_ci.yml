name: Olist Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install meltano

    - name: Meltano Install
      run: |
        meltano install
      # This installs your extractors, loaders, and dbt-duckdb defined in meltano.yml

    - name: Run ELT Pipeline
      run: |
        # Run the ingestion and transformation
        meltano run tap-parquet target-duckdb dbt-duckdb:run
      env:
        # If you have credentials for BigQuery, add them as GitHub Secrets
        BIGQUERY_CREDENTIALS: ${{ secrets.BIGQUERY_CREDENTIALS }}

    - name: Run Data Quality Tests
      run: |
        meltano run dbt-duckdb:test
      # This is the "CD" part—ensuring the data is valid before deployment
